name: "verify: backend"

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'apps/backend/**'
      - '.github/workflows/verify-backend.yaml'
      - 'apps/backend/pom.xml'
  workflow_dispatch:

jobs:
  verify:
    name: Verify backend compiles and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
      - name: Cache Dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # ratchet:actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Run tests
        env:
          GITHUB_USERNAME: x-access-token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn clean test --also-make --batch-mode
