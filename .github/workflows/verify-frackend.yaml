name: "verify: frackend"

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'apps/frackend/**'
      - '.github/*/verify-frackend.yaml'

jobs:
  verify:
    name: Verify there are no lint or typescript errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - name: Install dependencies
        working-directory: apps/frackend
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Run ESLint
        working-directory: apps/frackend
        run: npm run lint

      - name: Check for typescript errors
        working-directory: apps/frackend
        run: npm run check-types
